<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小芃日历 - 订阅服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            width: 90%;
            padding: 40px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 32px;
        }
        .step {
            margin-bottom: 24px;
        }
        .step-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .url-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 13px;
            color: #7dd3fc;
            word-break: break-all;
            line-height: 1.5;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .instructions {
            margin-top: 32px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .instructions h3 {
            font-size: 15px;
            color: #c4b5fd;
            margin-bottom: 12px;
        }
        .instructions ol {
            padding-left: 20px;
            font-size: 14px;
            line-height: 2;
            color: #bbb;
        }
        .instructions li::marker { color: #7c6fe0; }
        .tip {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(124,111,224,0.1);
            border-left: 3px solid #7c6fe0;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 小芃日历</h1>
        <p class="subtitle">iCalendar 订阅服务 · 自动同步到苹果日历</p>

        <div class="step">
            <div class="step-label">订阅链接</div>
            <div class="url-box" id="urlBox">
                <button class="copy-btn" onclick="copyUrl()">复制</button>
                <span id="urlText">加载中...</span>
            </div>
        </div>

        <div class="instructions">
            <h3>📖 订阅方法</h3>
            <ol>
                <li>复制上方的订阅链接</li>
                <li>打开 iPhone「设置」→「日历」→「帐户」→「添加帐户」</li>
                <li>选择「添加已订阅的日历」</li>
                <li>粘贴链接，点击「下一步」完成订阅</li>
            </ol>
            <p style="font-size:13px;color:#888;margin-top:8px;">Mac 用户：打开日历 App → 文件 → 新建日历订阅 → 粘贴链接</p>
        </div>

        <div class="tip">
            💡 日历每 15 分钟自动刷新。告诉小芃你的日程，她会帮你添加到日历中。
        </div>
    </div>

    <script>
        const baseUrl = window.location.href.replace('index.html', '').replace(/\/$/, '');
        const icsUrl = baseUrl + '/calendar.ics';
        document.getElementById('urlText').textContent = icsUrl;

        function copyUrl() {
            navigator.clipboard.writeText(icsUrl).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '已复制 ✓';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }
    </script>
</body>
</html>
